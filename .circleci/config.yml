version: 2.1

parameters:
  docker-image:
    type: string
    default: “jep-jat-service
    description: "Docker Image name"
  docker-compose:
    type: string
    default: "docker-compose.compose.yml"
    description: "Docker compose filename"
  compose-project-name:
    type: string
    default: "aksoft"
    description: "Stable Docker Compose project name"
  remote-dir:
    type: string
    default: "/home/aksoft_jj"
    description: "Remote directory"
  remote-env-file:
    type: string
    default: "/home/aksoft_jj/aksoft.env"
    description: "Remote env file for docker-compose"
  username:
    type: string
    default: "aksoft_jj"
    description: "SSH host username"

jobs:
  build-and-package:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - restore_cache:
          keys:
            - maven-deps-{{ checksum "pom.xml" }}
            - maven-deps-
      - run:
          name: Build JAR with Maven
          command: mvn clean package -DskipTests  # собираем JAR, тесты можно включить убрав -DskipTests
      - save_cache:
          paths:
            - ~/.m2
          key: maven-deps-{{ checksum "pom.xml" }}
      - setup_remote_docker:
          version: docker24
      - run:
          name: Build Docker Image
          command: |
            DOCKER_BUILDKIT=1 docker build -t << pipeline.parameters.docker-image >>:latest .
      - run:
          name: Compress Docker Image
          command: |
            docker save << pipeline.parameters.docker-image >>:latest | gzip > << pipeline.parameters.docker-image >>.tar.gz
      - run:
          name: Check compressed image size
          command: ls -lh << pipeline.parameters.docker-image >>.tar.gz
      - persist_to_workspace:
          root: .
          paths:
            - << pipeline.parameters.docker-image >>.tar.gz
            - << pipeline.parameters.docker-compose >>

  transfer-and-run:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Setup SSH Key
          command: |
            echo $SSH_PRIVATE_KEY_LOCAL | base64 --decode > ./id_rsa
            chmod 400 id_rsa
      - run:
          name: Transfer Docker Image
          no_output_timeout: 30m
          command: |
            echo "📦 Transferring Docker image..."
            scp -o "StrictHostKeyChecking=no" -i ./id_rsa ./<< pipeline.parameters.docker-image >>.tar.gz << pipeline.parameters.username >>@$LOCALHOST:/tmp/
            echo "✅ Image transferred"
      - run:
          name: Transfer Docker Compose
          command: |
            echo "📦 Transferring docker-compose file..."
            scp -o "StrictHostKeyChecking=no" -i ./id_rsa ./<< pipeline.parameters.docker-compose >> << pipeline.parameters.username >>@$LOCALHOST:<< pipeline.parameters.remote-dir >>/<< pipeline.parameters.docker-compose >>
            echo "✅ Docker-compose transferred"
      - run:
          name: Stop Remote Docker-Compose
          command: |
            ssh -o "StrictHostKeyChecking=no" -i ./id_rsa << pipeline.parameters.username >>@$LOCALHOST '
              echo "🛑 Stopping containers..."
              cd << pipeline.parameters.remote-dir >>

              COMPOSE_FILE="<< pipeline.parameters.docker-compose >>"
              COMPOSE_PROJECT="<< pipeline.parameters.compose-project-name >>"
              ENV_FILE="<< pipeline.parameters.remote-env-file >>"

              if ! docker info >/dev/null 2>&1; then
                echo "Docker is not accessible for user $(whoami). Add user to docker group."
                exit 1
              fi
            if [ -f "$COMPOSE_FILE" ]; then
                            if [ ! -r "$ENV_FILE" ]; then
                              echo "Environment file $ENV_FILE is missing or not readable"
                              exit 1
                            fi
                            docker-compose -p "$COMPOSE_PROJECT" --env-file "$ENV_FILE" -f "$COMPOSE_FILE" down || true
                          else
                            echo "$COMPOSE_FILE not found, skipping..."
                          fi
                        '
                  - run:
                      name: Load Docker Image and Run Compose
                      command: |
                        ssh -o "StrictHostKeyChecking=no" -i ./id_rsa << pipeline.parameters.username >>@$LOCALHOST '
                          echo "📦 Loading Docker image..."
                          if ! docker info >/dev/null 2>&1; then
                            echo "Docker is not accessible for user $(whoami). Add user to docker group."
                            exit 1
                          fi

                          gunzip -c /tmp/<< pipeline.parameters.docker-image >>.tar.gz | docker load

                          echo "🧹 Cleaning up..."
                          rm /tmp/<< pipeline.parameters.docker-image >>.tar.gz

                          echo "🚀 Starting services..."
                          cd << pipeline.parameters.remote-dir >>
                          COMPOSE_FILE="<< pipeline.parameters.docker-compose >>"
                          COMPOSE_PROJECT="<< pipeline.parameters.compose-project-name >>"
                          ENV_FILE="<< pipeline.parameters.remote-env-file >>"

                          if [ ! -r "$ENV_FILE" ]; then
                            echo "Environment file $ENV_FILE is missing or not readable"
                            exit 1
                          fi

                          docker-compose -p "$COMPOSE_PROJECT" --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d --force-recreate --remove-orphans

                          echo "🧹 Removing old images..."
                          docker image prune -f

                          echo "✅ Deployment complete!"
                          docker-compose -p "$COMPOSE_PROJECT" --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps

                          echo "📋