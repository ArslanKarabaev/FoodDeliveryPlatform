services:
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_DB=food_delivery
      - POSTGRES_PASSWORD=Arspostgres
      - POSTGRES_USER=postgres
    ports:
      - "5433:5432"
  redis:
    image: 'redis:latest'
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data: